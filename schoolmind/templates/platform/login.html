{% extends "base.html" %}
{% block title %}{{ t('platform.login.title') }} · SchoolMind{% endblock %}
{% block content %}
<div class="auth-wrap">
  <form class="pixel-form" method="post">
    {% include "partials/form_csrf.html" %}
    <span class="eyebrow">{{ t('platform.login.eyebrow') }}</span>
    <h1>{{ t('platform.login.title') }}</h1>
    <p class="muted">{{ t('platform.login.body') }}</p>
    <label>{{ t('auth.common.email') }}<input name="email" type="email" required autocomplete="email"></label>
    <label>{{ t('auth.common.password') }}<input name="password" type="password" required autocomplete="current-password"></label>
    <button class="btn primary" type="submit">{{ t('platform.login.submit') }}</button>
  </form>
</div>
{% endblock %}
