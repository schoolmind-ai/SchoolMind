{% extends "base.html" %}
{% block title %}{{ t('auth.reset.title') }} · SchoolMind{% endblock %}
{% block content %}
<section class="auth-wrap">
  <form class="pixel-form" method="post">
    {% include "partials/form_csrf.html" %}
    <span class="eyebrow">{{ t('auth.reset.eyebrow') }}</span>
    <h1>{{ t('auth.reset.heading') }}</h1>
    <p class="muted">{{ t('auth.reset.account') }}: {{ reset.email }}</p>
    <label>{{ t('auth.reset.new_password') }}<input name="password" type="password" minlength="8" required></label>
    <button class="btn primary" type="submit">{{ t('auth.reset.submit') }}</button>
  </form>
</section>
{% endblock %}
