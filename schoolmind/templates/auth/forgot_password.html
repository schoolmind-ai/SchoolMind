{% extends "base.html" %}
{% block title %}{{ t('auth.forgot.title') }} · SchoolMind{% endblock %}
{% block content %}
<section class="auth-wrap">
  <form class="pixel-form" method="post">
    {% include "partials/form_csrf.html" %}
    <span class="eyebrow">{{ t('auth.forgot.eyebrow') }}</span>
    <h1>{{ t('auth.forgot.heading') }}</h1>
    <p class="muted">{{ t('auth.forgot.body') }}</p>
    <label>{{ t('auth.common.email') }}<input name="email" type="email" required></label>
    <button class="btn primary" type="submit">{{ t('auth.forgot.submit') }}</button>
  </form>
</section>
{% endblock %}
